skills:
- description: Restore uint32/uint64 operator support in PyTorch
  environment:
    base_image: zhangyiiiiii/swe-skills-bench-pytorch:latest
    build_args: {}
    build_context: ''
    dockerfile: ''
    env_vars: {}
    evaluation:
    - enabled: true
      level: L1
      method: build_check
      params:
        build_command: cd pytorch && MAX_JOBS=4 USE_CUDA=0 python setup.py develop
        expected_exit_code: 0
        timeout: 3600
    - enabled: true
      level: L2
      method: unit_test
      params:
        min_pass_rate: 0.5
        test_command: python -m pytest /workspace/tests/test_add_uint_support.py -v
          --tb=short
        timeout: 600
    limits:
      max_iterations: 1
      total_timeout_sec: 1800
    pre_process: null
    setup_commands: []
